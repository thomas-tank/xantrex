esphome:
  name: xantrex

external_components:
  - source:
      type: local
      path: custom_components
    components: [ xantrex ]

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.x.x   # 👈 Your active device IP
    gateway: 192.168.x.x     # 👈 Your actual network router/gateway
    subnet: 255.255.255.0

web_server:
  port: 8080
  auth:
    username: admin
    password: !secret web_server_password

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: D4
  rx_pin: D3

ota:
  platform: esphome
  password: !secret xantrex__ota_password

safe_mode:

logger:
  level: INFO
  baud_rate: 0
  esp8266_store_log_strings_in_flash: False

api:
  encryption:
    key: !secret api_encryption_key
    
sensor:
  - platform: xantrex
    uart_id: uart_bus
    kwhlife:
      name: "PV kwh life"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total_increasing"
      accuracy_decimals: 0
    kwhtoday:
      name: "PV kwh today"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total_increasing"
      accuracy_decimals: 3
    pin:
      name: "PV power in"
      unit_of_measurement: "W"
      device_class: "power"
      state_class: "measurement"
      accuracy_decimals: 0
    pout:
      name: "PV power out"
      unit_of_measurement: "W"
      device_class: "power"
      state_class: "measurement"
      accuracy_decimals: 0
    vin:
      name: "PV volts in"
      unit_of_measurement: "V"
      device_class: "voltage"
      state_class: "measurement"
      accuracy_decimals: 1
    vout:
      name: "PV volts out"
      unit_of_measurement: "V"
      device_class: "voltage"
      state_class: "measurement"
      accuracy_decimals: 1
    iin:
      name: "PV current in"
      unit_of_measurement: "A"
      device_class: "current"
      state_class: "measurement"
      accuracy_decimals: 2
    iout:
      name: "PV current out"
      unit_of_measurement: "A"
      device_class: "current"
      state_class: "measurement"
      accuracy_decimals: 2
    freq:
      name: "PV frequency"
      unit_of_measurement: "Hz"
      state_class: "measurement"
      accuracy_decimals: 3
    time:
      name: "PV time"
      unit_of_measurement: "seconds"
      state_class: "measurement"
      accuracy_decimals: 0
    temp:
      name: "PV temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      accuracy_decimals: 1
